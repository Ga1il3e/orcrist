<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />
  <title>Orcrist Holding — email signature (preview)</title>
</head>
<body style="margin:0;padding:24px;background:#f5f5f5;font-family:'Cinzel',Georgia,'Times New Roman',Times,serif;">
  <!--
    ORCRIST HOLDING — professional email signature
    - Replace YOUR_NAME, YOUR_TITLE, YOUR_PHONE with your details.
    - Copy everything inside the SIGNATURE_START / SIGNATURE_END block into your mail client.
    - Gmail: Settings → General → Signature → paste HTML (may need to paste in "Insert HTML" add-on or use plain table version).
    - Outlook: New email → Signature → paste (Outlook sometimes strips SVG; use email-signature-orcrist-holding-outlook.html if needed).
    - Apple Mail: Preferences → Signatures → paste HTML.
  -->

  <!-- SIGNATURE_START -->
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;max-width:520px;font-family:'Cinzel',Georgia,'Times New Roman',Times,serif;color:#1a1a1a;">
    <tr>
      <td style="padding:0 0 14px 0;vertical-align:top;">
        <!-- Same as site gate: Cinzel stroke ORCRIST (Trajan/cinematic style) + HOLDING -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="280" height="80" role="img" aria-label="Orcrist Holding" style="display:block;max-width:280px;height:auto;">
          <text x="50%" y="52" text-anchor="middle" fill="none" stroke="#C9A84C" stroke-width="1.1" font-family="'Cinzel',Georgia,'Times New Roman',serif" font-size="42" font-weight="400" letter-spacing="0.32em">ORCRIST</text>
          <text x="50%" y="98" text-anchor="middle" fill="#6b6b6b" font-family="'Cinzel',Georgia,'Times New Roman',serif" font-size="10" font-weight="400" letter-spacing="0.58em" text-transform="uppercase">HOLDING</text>
          <line x1="90" y1="108" x2="330" y2="108" stroke="#C9A84C" stroke-width="1" opacity="0.55" />
        </svg>
      </td>
    </tr>
    <tr>
      <td style="padding:0;font-size:15px;line-height:1.45;color:#111;">
        <strong style="font-weight:600;letter-spacing:0.02em;">Your Name</strong>
      </td>
    </tr>
    <tr>
      <td style="padding:4px 0 0 0;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;color:#555;">
        Chief Executive Officer
      </td>
    </tr>
    <tr>
      <td style="padding:12px 0 0 0;font-size:13px;line-height:1.55;color:#333;">
        Orcrist Holding<br />
        Paris, France
      </td>
    </tr>
    <tr>
      <td style="padding:10px 0 0 0;font-size:13px;line-height:1.6;">
        <a href="mailto:ceo@orcristholding.com" style="color:#1a1a1a;text-decoration:none;border-bottom:1px solid #C9A84C;">ceo@orcristholding.com</a>
        <span style="color:#bbb;"> &nbsp;|&nbsp; </span>
        <span style="color:#333;">+33&nbsp;0&nbsp;00&nbsp;00&nbsp;00&nbsp;00</span>
      </td>
    </tr>
    <tr>
      <td style="padding:14px 0 0 0;font-size:11px;color:#888;">
        <a href="https://orcristholding.com" style="color:#888;text-decoration:none;">orcristholding.com</a>
      </td>
    </tr>
  </table>
  <!-- SIGNATURE_END -->

  <p style="font-family:system-ui,sans-serif;font-size:12px;color:#666;margin-top:32px;">
    Preview only — copy the table above (between SIGNATURE comments) into your mail client. Replace name, title, phone, and domain if needed.
  </p>
</body>
</html>
